<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Deposit Predictor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        // Clean text-based icons to avoid external icon dependencies
        const Sliders = () => <span class="mr-1">⚙️</span>;
        const User = () => <span class="mr-1">👤</span>;
        const Phone = () => <span class="mr-1">📞</span>;
        const Layers = () => <span class="mr-1">📊</span>;
        const Percent = () => <span class="mr-1">%</span>;
        const Briefcase = () => <span class="mr-1">💼</span>;
        const TrendingUp = () => <span class="mr-1">📈</span>;

        // Model mathematical constants calculated from the main dataset
        const MEANS = { age: 40.0, duration: 258.0, campaign: 2.5, euribor3m: 3.6, job_retired: 0.04, job_student: 0.02, job_blue_collar: 0.22 };
        const STDS = { age: 10.4, duration: 259.0, campaign: 2.7, euribor3m: 1.7, job_retired: 0.20, job_student: 0.14, job_blue_collar: 0.41 };
        const WEIGHTS = { age: 0.06, duration: 1.18, campaign: -0.16, euribor3m: -0.72, job_retired: 0.32, job_student: 0.45, job_blue_collar: -0.18, intercept: -1.35 };

        function App() {
            const [inputs, setInputs] = React.useState({ age: 40, duration: 260, campaign: 1, euribor3m: 3.6, job: 'admin.' });

            const loadPreset = (type) => {
                const presets = {
                    hot: { age: 62, duration: 650, campaign: 1, euribor3m: 1.1, job: 'retired' },
                    average: { age: 39, duration: 250, campaign: 2, euribor3m: 3.6, job: 'admin.' },
                    cold: { age: 34, duration: 60, campaign: 5, euribor3m: 4.8, job: 'blue-collar' }
                };
                setInputs(presets[type]);
            };

            const calculatePrediction = () => {
                const isRetired = inputs.job === 'retired' ? 1 : 0;
                const isStudent = inputs.job === 'student' ? 1 : 0;
                const isBlueCollar = inputs.job === 'blue-collar' ? 1 : 0;

                const values = { age: inputs.age, duration: inputs.duration, campaign: inputs.campaign, euribor3m: inputs.euribor3m, job_retired: isRetired, job_student: isStudent, job_blue_collar: isBlueCollar };
                let logit = WEIGHTS.intercept;

                Object.keys(values).forEach(key => {
                    const originalValue = values[key];
                    const standardizedValue = (originalValue - MEANS[key]) / STDS[key];
                    logit += WEIGHTS[key] * standardizedValue;
                });

                return 1 / (1 + Math.exp(-Math.max(-20, Math.min(20, logit))));
            };

            const probability = calculatePrediction();

            return (
                <div class="min-h-screen flex flex-col justify-between">
                    <header class="border-b border-slate-800 bg-slate-900/50 py-4">
                        <div class="max-w-6xl mx-auto px-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <TrendingUp />
                                <h1 class="text-lg font-black text-white">Bank Deposit Predictor</h1>
                            </div>
                            <div class="flex gap-2">
                                <button onClick={() => loadPreset('hot')} class="px-2.5 py-1 text-xs font-bold rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 hover:bg-emerald-500/20 transition">Preset: Interested</button>
                                <button onClick={() => loadPreset('average')} class="px-2.5 py-1 text-xs font-bold rounded bg-slate-800 text-slate-300 border border-slate-700 hover:bg-slate-700 transition">Preset: Baseline</button>
                                <button onClick={() => loadPreset('cold')} class="px-2.5 py-1 text-xs font-bold rounded bg-rose-500/10 text-rose-400 border border-rose-500/20 hover:bg-rose-500/20 transition">Preset: Uninterested</button>
                            </div>
                        </div>
                    </header>

                    <main class="max-w-6xl mx-auto px-4 py-12 w-full grid grid-cols-1 md:grid-cols-12 gap-8 items-stretch">
                        {/* Parameters column */}
                        <div class="md:col-span-6 bg-slate-800/40 border border-slate-800 rounded-2xl p-6 space-y-6 flex flex-col justify-between">
                            <div>
                                <h2 class="text-sm font-bold uppercase tracking-wider flex items-center gap-2"><Sliders />Prospect Parameters</h2>
                                <p class="text-xs text-slate-400 mt-1">Adjust parameters to see prediction updates instantly</p>
                            </div>
                            
                            <div class="space-y-2">
                                <div class="flex justify-between text-xs"><span class="flex items-center gap-1"><User />Age</span><span class="font-mono font-bold text-indigo-400">{inputs.age} yrs</span></div>
                                <input type="range" min="18" max="95" value={inputs.age} onChange={(e) => setInputs({...inputs, age: parseInt(e.target.value)})} class="w-full accent-indigo-500 cursor-pointer" />
                            </div>
                            
                            <div class="space-y-2">
                                <div class="flex justify-between text-xs"><span class="flex items-center gap-1"><Phone />Duration</span><span class="font-mono font-bold text-emerald-400">{inputs.duration} sec</span></div>
                                <input type="range" min="0" max="1500" step="10" value={inputs.duration} onChange={(e) => setInputs({...inputs, duration: parseInt(e.target.value)})} class="w-full accent-emerald-500 cursor-pointer" />
                            </div>
                            
                            <div class="space-y-2">
                                <div class="flex justify-between text-xs"><span class="flex items-center gap-1"><Layers />Campaign Contacts</span><span class="font-mono font-bold text-amber-400">{inputs.campaign}</span></div>
                                <input type="range" min="1" max="15" value={inputs.campaign} onChange={(e) => setInputs({...inputs, campaign: parseInt(e.target.value)})} class="w-full accent-amber-500 cursor-pointer" />
                            </div>
                            
                            <div class="space-y-2">
                                <div class="flex justify-between text-xs"><span class="flex items-center gap-1"><Percent />Euribor 3M Rate</span><span class="font-mono font-bold text-cyan-400">{inputs.euribor3m}%</span></div>
                                <input type="range" min="0.5" max="5.5" step="0.1" value={inputs.euribor3m} onChange={(e) => setInputs({...inputs, euribor3m: parseFloat(e.target.value)})} class="w-full accent-cyan-500 cursor-pointer" />
                            </div>
                            
                            <div class="space-y-2">
                                <label class="text-xs font-semibold flex items-center gap-1"><Briefcase />Occupation Group</label>
                                <select value={inputs.job} onChange={(e) => setInputs({...inputs, job: e.target.value})} class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200 outline-none focus:border-indigo-500">
                                    <option value="admin.">Administrative / Professional</option>
                                    <option value="retired">Retired / Pensioner</option>
                                    <option value="student">Student</option>
                                    <option value="blue-collar">Blue Collar Worker</option>
                                </select>
                            </div>
                        </div>

                        {/* Visual dial outcome column */}
                        <div class="md:col-span-6 bg-gradient-to-br from-slate-850 to-slate-900 border border-slate-800 rounded-2xl p-8 flex flex-col justify-center items-center shadow-xl text-center min-h-[400px]">
                            <div class="relative my-8">
                                <svg class="w-48 h-48 transform -rotate-90">
                                    <circle cx="96" cy="96" r="84" stroke="#1e293b" stroke-width="10" fill="none" />
                                    <circle cx="96" cy="96" r="84" stroke={probability > 0.5 ? '#34d399' : probability > 0.2 ? '#fbbf24' : '#f43f5e'} stroke-width="10" fill="none" stroke-dasharray="527.7" stroke-dashoffset={527.7 - (527.7 * probability)} stroke-linecap="round" class="transition-all duration-300" />
                                </svg>
                                <div class="absolute inset-0 flex flex-col items-center justify-center font-mono">
                                    <span class="text-4xl font-black text-white">{Math.round(probability * 100)}%</span>
                                    <span class="text-xs text-slate-500 font-bold tracking-widest mt-1">probability</span>
                                </div>
                            </div>
                            <div class="space-y-2 max-w-xs">
                                <span class={`inline-block px-3 py-1 rounded-full text-xs font-extrabold uppercase ${probability > 0.5 ? 'bg-emerald-500/10 text-emerald-400' : probability > 0.2 ? 'bg-amber-500/10 text-amber-400' : 'bg-rose-500/10 text-rose-400'}`}>
                                    {probability > 0.5 ? 'High Value Target' : probability > 0.2 ? 'Moderate Opportunity' : 'Low Conversion Risk'}
                                </span>
                                <p class="text-xs text-slate-400 leading-relaxed">
                                    {probability > 0.5 ? 'The model anticipates high propensity. Long contact durations heavily drive subscription values up.' : probability > 0.2 ? 'Prospect shows baseline compliance. Structured campaign incentives are recommended to convert.' : 'Low estimated responsiveness due to minimal contact length or elevated interest indices.'}
                                </p>
                            </div>
                        </div>
                    </main>

                    <footer class="border-t border-slate-800 bg-slate-950/50 py-4 text-center text-[10px] text-slate-500">
                        UCI Bank Marketing Dataset Pre-Calibrated Logistic Model.
                    </footer>
                </div>
            );
        }

        // Mount the React component into the web layout safely
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
